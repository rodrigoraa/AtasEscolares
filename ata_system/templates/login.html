<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Atas Escolares</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', path='/style.css') }}" rel="stylesheet">
</head>
<body class="login-page">
  <main class="login-box">
    <h1 class="h4 mb-1">Atas Escolares</h1>
    <p class="text-muted mb-4">Acesse para gerar e consultar atas disciplinares.</p>
    {% if erro %}
      <div class="alert alert-danger">{{ erro }}</div>
    {% endif %}
    <form method="post" action="/login">
      <div class="mb-3">
        <label class="form-label" for="usuario">Usuário</label>
        <input class="form-control" id="usuario" name="usuario" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label" for="senha">Senha</label>
        <input class="form-control" id="senha" name="senha" type="password" required>
      </div>
      <button class="btn btn-primary w-100" type="submit">Entrar</button>
    </form>
    <p class="small text-muted mt-3 mb-0">Usuário inicial: admin / admin123</p>
  </main>
</body>
</html>
